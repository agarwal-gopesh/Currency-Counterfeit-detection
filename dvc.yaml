stages:
  make_dataset:
    cmd: python3 src/data/make_dataset.py data/raw
    deps:
    - src/data/make_dataset.py
    - data/raw
    params:
    - make_dataset.test_split
    - make_dataset.seed
    outs:
    - data/processed/train.csv
    - data/processed/test.csv

  predict:
    cmd: python3 src/models/predict.py
    deps:
    - src/models/predict.py
    - artifacts/models/multi_output_model.keras
    params:
    - predict.model_path
    - predict.image_path
    - predict.output_dir
    - train.img_size
    outs:
    - reports/predictions

