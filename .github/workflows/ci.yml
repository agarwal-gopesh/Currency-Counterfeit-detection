name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 easyocr Pillow PyYAML numpy scikit-learn
          pip install tensorflow --quiet
          pip install -e .

      - name: Lint
        run: flake8 src/

      - name: Predict test
        run: |
          python3 -c "
          from src.models.predict import load_saved_model, preprocess_image, predict
          print('Imports OK')
          "
